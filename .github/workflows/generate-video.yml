name: Generate Video
on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Script text'
        required: true
        default: 'INT. STUDIO - NIGHT'
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Generate
        run: echo "Script: ${{ github.event.inputs.script }}" > output.txt
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: video-output
          path: output.txt