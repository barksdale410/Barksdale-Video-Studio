<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BARKSDALE VIDEO STUDIO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b0d10; color: #e6edf3; font-family: system-ui, sans-serif; padding: 16px; max-width: 480px; margin: 0 auto; padding-bottom: 80px; }
        h1 { font-size: 28px; font-weight: 800; }
        h1 span { background: linear-gradient(135deg, #f0883e, #e65c1a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #8b949e; font-size: 14px; border-left: 3px solid #f0883e; padding-left: 12px; margin-bottom: 16px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
        label { display: block; font-size: 12px; color: #8b949e; margin: 12px 0 4px; text-transform: uppercase; }
        select, textarea { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 10px; color: #e6edf3; font-size: 15px; font-family: inherit; }
        textarea { min-height: 150px; resize: vertical; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #238636, #2ea043); border: none; border-radius: 10px; color: white; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 12px; }
        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .output { background: #0d1117; border-radius: 10px; padding: 12px; font-family: monospace; font-size: 12px; color: #8b949e; margin-top: 12px; border: 1px solid #21262d; max-height: 300px; overflow-y: auto; white-space: pre-wrap; }
        .hidden { display: none; }
        .loading { display: none; text-align: center; padding: 20px; }
        .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #21262d; border-top: 3px solid #f0883e; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .scene-card { background: #0d1117; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #21262d; }
        .scene-card strong { color: #58a6ff; }
        .scene-card .duration { color: #8b949e; font-size: 12px; }
        .director-info { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .director-badge { background: #21262d; padding: 4px 8px; border-radius: 6px; font-size: 11px; color: #c9d1d9; }
        .color-palette { display: flex; gap: 4px; margin-top: 8px; }
        .color-swatch { width: 24px; height: 24px; border-radius: 4px; border: 1px solid #30363d; }
        .api-status { text-align: center; padding: 8px; border-radius: 8px; font-size: 12px; margin-bottom: 12px; }
        .api-status.connected { background: rgba(46, 160, 67, 0.2); color: #2ea043; }
        .api-status.disconnected { background: rgba(248, 81, 73, 0.2); color: #f85149; }
        .api-config { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 8px; margin-bottom: 12px; }
        .api-config input { background: transparent; border: none; color: #e6edf3; font-size: 12px; width: 100%; }
        .api-config input:focus { outline: none; }
        .scene-details { font-size: 11px; color: #8b949e; margin-top: 4px; }
        .scene-details span { display: inline-block; margin-right: 8px; }
        .success-message { background: rgba(46, 160, 67, 0.2); border: 1px solid #2ea043; border-radius: 8px; padding: 16px; margin-top: 12px; text-align: center; }
        .success-message h3 { color: #2ea043; margin-bottom: 8px; }
        .success-message a { color: #58a6ff; text-decoration: none; }
    </style>
</head>
<body>
    <h1>🎬 <span>BARKSDALE</span> VIDEO STUDIO</h1>
    <p class="subtitle">Script to Screen — AI-Powered Movie Production</p>

    <div class="api-config">
        <label style="margin: 0 0 4px 0;">🔗 API Endpoint</label>
        <input type="text" id="apiUrl" placeholder="https://your-backend.onrender.com">
    </div>
    <div id="apiStatus" class="api-status disconnected">⚫ Not Connected</div>

    <div id="loading" class="loading"><div class="spinner"></div><p>Processing...</p></div>

    <div class="card">
        <label>🎥 Director</label>
        <select id="director">
            <option value="">Select a director...</option>
        </select>
        <div id="directorInfo" class="hidden"></div>

        <label>🎭 Genre</label>
        <select id="genre">
            <option value="">Select a genre...</option>
        </select>

        <label>🎨 Mood</label>
        <select id="mood">
            <option value="">Select a mood...</option>
        </select>

        <label>📝 Script</label>
        <textarea id="script" placeholder="Paste your script here...

Example:
INT. DARK STUDIO - NIGHT

A lone producer sits at a mixing console. Neon lights flicker.

PRODUCER
(whispering)
The beat is almost ready.

EXT. CITY SKYLINE - DUSK

The city lights begin to glow as the sun sets.">INT. DARK STUDIO - NIGHT

A lone producer sits at a mixing console. Neon lights flicker.

PRODUCER
(whispering)
The beat is almost ready.</textarea>

        <button id="analyzeBtn">🎬 Analyze Script</button>
    </div>

    <div id="storyboard" class="card hidden">
        <div style="display:flex;justify-content:space-between;color:#8b949e;font-size:13px;margin-bottom:8px;">
            <span>📋 STORYBOARD</span>
            <span id="sceneCount">0 scenes</span>
        </div>
        <div id="storyboardContent"></div>
        <button id="generateVideoBtn">🎬 Generate Movie</button>
    </div>

    <div id="successMessage" class="success-message hidden">
        <h3>🎉 Video Generation Started!</h3>
        <p id="videoMessage">Your movie is being rendered...</p>
        <p style="margin-top: 8px; font-size: 11px; color: #8b949e;">Video ID: <span id="videoId"></span></p>
    </div>

    <div id="output" class="output hidden"></div>

    <script>
        let API_BASE_URL = '';
        let directorsData = [];

        function saveApiUrl() {
            localStorage.setItem('VS_API', API_BASE_URL);
        }

        function loadApiUrl() {
            const saved = localStorage.getItem('VS_API');
            if (saved) {
                API_BASE_URL = saved;
                document.getElementById('apiUrl').value = saved;
            } else if (window.location.hostname === 'localhost') {
                API_BASE_URL = 'http://localhost:8001';
                document.getElementById('apiUrl').value = API_BASE_URL;
            }
        }

        function updateApiStatus(connected) {
            const status = document.getElementById('apiStatus');
            if (connected) {
                status.className = 'api-status connected';
                status.textContent = '🟢 Connected';
            } else {
                status.className = 'api-status disconnected';
                status.textContent = '⚫ Not Connected';
            }
        }

        async function checkApiHealth() {
            if (!API_BASE_URL) {
                updateApiStatus(false);
                return;
            }
            try {
                const res = await fetch(API_BASE_URL + '/api/health', { method: 'GET' });
                if (res.ok) {
                    updateApiStatus(true);
                    await loadOptions();
                } else {
                    updateApiStatus(false);
                }
            } catch (err) {
                updateApiStatus(false);
            }
        }

        async function loadOptions() {
            if (!API_BASE_URL) return;
            try {
                const res = await fetch(API_BASE_URL + '/api/options');
                const data = await res.json();
                
                // Load directors
                const dirSel = document.getElementById('director');
                data.directors.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d;
                    opt.textContent = d;
                    dirSel.appendChild(opt);
                });

                // Load genres
                const genSel = document.getElementById('genre');
                data.genres.forEach(g => {
                    const opt = document.createElement('option');
                    opt.value = g;
                    opt.textContent = g;
                    genSel.appendChild(opt);
                });

                // Load moods
                const moodSel = document.getElementById('mood');
                data.moods.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m;
                    opt.textContent = m;
                    moodSel.appendChild(opt);
                });

                // Load director details for the info panel
                const dirRes = await fetch(API_BASE_URL + '/api/directors');
                const dirData = await dirRes.json();
                directorsData = dirData.directors || [];
            } catch (err) {
                console.error('Error loading options:', err);
            }
        }

        function showDirectorInfo(directorName) {
            const infoDiv = document.getElementById('directorInfo');
            const director = directorsData.find(d => d.name === directorName);
            
            if (director) {
                infoDiv.innerHTML = `
                    <div class="director-info">
                        <span class="director-badge">⭐ ${director.rating}/5</span>
                        <span class="director-badge">$${director.price_per_hour}/hr</span>
                        ${director.specialties.map(s => `<span class="director-badge">${s}</span>`).join('')}
                    </div>
                    <div class="color-palette">
                        ${director.color_palette.map(c => `<div class="color-swatch" style="background:${c}" title="${c}"></div>`).join('')}
                    </div>
                    <div class="scene-details">
                        <span>🎥 ${director.camera}</span>
                        <span>💡 ${director.lighting}</span>
                    </div>
                `;
                infoDiv.classList.remove('hidden');
            } else {
                infoDiv.classList.add('hidden');
            }
        }

        // Event Listeners
        document.getElementById('apiUrl').addEventListener('change', (e) => {
            API_BASE_URL = e.target.value.trim().replace(/\/$/, '');
            saveApiUrl();
            checkApiHealth();
        });

        document.getElementById('director').addEventListener('change', (e) => {
            showDirectorInfo(e.target.value);
        });

        document.getElementById('analyzeBtn').addEventListener('click', async () => {
            if (!API_BASE_URL) {
                alert('Please set the API endpoint first!');
                return;
            }
            if (!document.getElementById('script').value.trim()) {
                alert('Please enter a script!');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('storyboard').classList.add('hidden');
            document.getElementById('successMessage').classList.add('hidden');
            document.getElementById('output').classList.add('hidden');
            
            try {
                const res = await fetch(API_BASE_URL + '/api/script/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        script: document.getElementById('script').value,
                        director: document.getElementById('director').value || 'Hype Williams',
                        genre: document.getElementById('genre').value || 'Drama',
                        mood: document.getElementById('mood').value || 'Cinematic'
                    })
                });
                const data = await res.json();
                
                const sb = document.getElementById('storyboard');
                sb.classList.remove('hidden');
                document.getElementById('sceneCount').textContent = data.scene_count + ' scenes | ' + data.total_duration + 's total';
                
                document.getElementById('storyboardContent').innerHTML = data.scenes.map((s, i) =>
                    `<div class="scene-card">
                        <strong>Scene ${i+1}</strong>
                        <span class="duration">${s.duration}s</span>
                        <div style="font-size:13px;color:#c9d1d9;margin-top:4px;">${s.heading || 'No heading'}</div>
                        <div style="font-size:12px;color:#8b949e;margin-top:4px;">${(s.action || '').substring(0, 100)}...</div>
                        <div class="scene-details">
                            <span>🎨 ${s.emotional_tone}</span>
                            <span>📷 ${s.camera}</span>
                        </div>
                    </div>`
                ).join('');
                window.storyboard = data.scenes;
            } catch (err) {
                const output = document.getElementById('output');
                output.classList.remove('hidden');
                output.textContent = '❌ Error: ' + err.message;
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        });

        document.getElementById('generateVideoBtn').addEventListener('click', async () => {
            if (!API_BASE_URL) {
                alert('Please set the API endpoint first!');
                return;
            }
            if (!window.storyboard) {
                alert('Please analyze a script first!');
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('storyboard').classList.add('hidden');
            
            try {
                const res = await fetch(API_BASE_URL + '/api/video/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        storyboard: window.storyboard,
                        director: document.getElementById('director').value || 'Hype Williams'
                    })
                });
                const data = await res.json();
                
                document.getElementById('successMessage').classList.remove('hidden');
                document.getElementById('videoMessage').textContent = data.message;
                document.getElementById('videoId').textContent = data.video_id;
            } catch (err) {
                document.getElementById('output').classList.remove('hidden');
                document.getElementById('output').textContent = '❌ Error: ' + err.message;
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        });

        // Initialize
        loadApiUrl();
        checkApiHealth();
    </script>
</body>
</html>
